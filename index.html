<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>OWAIS SHAIKH · LINKTREE</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      color: white;
    }

    /* video background */
    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }

    .video-bg video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .video-bg .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(2px);
    }

    /* main content */
    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1.5rem;
      text-align: center;
    }

    /* ----- MUCH BIGGER LOGO ----- */
    .logo {
      width: 260px;            /* significantly larger */
      height: 260px;
      object-fit: cover;
      border-radius: 50%;
      border: 5px solid rgba(255, 255, 255, 0.9);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.7), 0 0 0 4px rgba(255, 255, 255, 0.3) inset;
      margin-bottom: 2.5rem;
      animation: floatGlow 3.5s ease-in-out infinite;
      transition: transform 0.3s ease, border-color 0.2s;
      background: rgba(0,0,0,0.2);
    }

    .logo:hover {
      transform: scale(1.06) rotate(1.5deg);
      border-color: #ffffff;
    }

    /* links container */
    .links {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      width: 100%;
      max-width: 550px;
      margin: 1rem 0 1.8rem 0;
    }

    /* rounded link cards */
    .link-item {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      width: 100%;
      padding: 1.2rem 2rem;
      background: rgba(20, 20, 30, 0.3);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 60px;
      color: white;
      text-decoration: none;
      font-size: 1.4rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.1) inset;
      transition: all 0.35s cubic-bezier(0.2, 0.9, 0.3, 1.2);
      opacity: 0;
      transform: translateY(20px);
      animation: slideUp 0.6s forwards;
      animation-fill-mode: both;
    }

    /* staggered delays */
    .link-item:nth-child(1) { animation-delay: 0.1s; }
    .link-item:nth-child(2) { animation-delay: 0.2s; }
    .link-item:nth-child(3) { animation-delay: 0.3s; }
    .link-item:nth-child(4) { animation-delay: 0.4s; }
    .link-item:nth-child(5) { animation-delay: 0.5s; }
    .link-item:nth-child(6) { animation-delay: 0.6s; }

    .link-item i {
      font-size: 2.2rem;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
      transition: transform 0.25s ease;
    }

    /* brand colors */
    .link-item .fa-instagram { color: #d62976; }
    .link-item .fa-snapchat-ghost { color: #FFFC00; text-shadow: 0 0 10px rgba(255,252,0,0.6); }
    .link-item .fa-whatsapp { color: #25D366; }
    .link-item .fa-phone-alt { color: #34B7F1; }
    .link-item .fa-envelope { color: #D44638; }
    .link-item .fa-map-marker-alt { color: #EA4335; }

    .link-item:hover {
      background: rgba(40, 40, 50, 0.6);
      border-color: rgba(255, 255, 255, 0.6);
      transform: scale(1.04) translateY(-5px);
      box-shadow: 0 25px 40px rgba(0, 0, 0, 0.6), 0 0 0 3px rgba(255, 255, 255, 0.2) inset;
    }

    .link-item:hover i {
      transform: scale(1.15);
    }

    .link-item:active {
      transform: scale(0.98) translateY(0);
      transition: transform 0.1s;
    }

    /* developer credit (no box) */
    .developer-credit {
      margin-top: 1.2rem;
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.9);
      text-shadow: 0 2px 5px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      gap: 5px;
      opacity: 0;
      animation: fadeUp 1s 0.8s forwards;
    }

    .developer-credit a {
      color: white;
      text-decoration: none;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: gap 0.2s;
      border-bottom: 1px dotted rgba(255,255,255,0.5);
      padding-bottom: 2px;
    }

    .developer-credit a i {
      font-size: 1.1rem;
      color: #ffd966;
      transition: transform 0.2s;
    }

    .developer-credit a:hover {
      gap: 12px;
      border-bottom-color: white;
    }

    .developer-credit a:hover i {
      transform: translateX(4px);
    }

    /* animations */
    @keyframes floatGlow {
      0% { transform: translateY(0px) scale(1); box-shadow: 0 25px 50px rgba(0,0,0,0.7), 0 0 0 4px rgba(255,255,255,0.2) inset; }
      50% { transform: translateY(-12px) scale(1.02); box-shadow: 0 40px 65px rgba(0,0,0,0.9), 0 0 0 8px rgba(255,255,240,0.3) inset; }
      100% { transform: translateY(0px) scale(1); box-shadow: 0 25px 50px rgba(0,0,0,0.7), 0 0 0 4px rgba(255,255,255,0.2) inset; }
    }

    @keyframes slideUp {
      0% { opacity: 0; transform: translateY(30px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(15px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* mobile fine-tuning: logo still big but adapts */
    @media (max-width: 600px) {
      .logo {
        width: 220px;
        height: 220px;
      }
    }

    @media (max-width: 450px) {
      .logo {
        width: 180px;
        height: 180px;
      }
      .link-item {
        padding: 1rem 1.5rem;
        font-size: 1.2rem;
      }
      .link-item i {
        font-size: 2rem;
      }
      .developer-credit {
        font-size: 1rem;
      }
    }

    /* landscape */
    @media (max-height: 600px) and (orientation: landscape) {
      .content {
        padding: 1rem;
      }
      .logo {
        width: 150px;
        height: 150px;
        margin-bottom: 1rem;
      }
      .links {
        gap: 0.8rem;
      }
    }
  </style>
</head>
